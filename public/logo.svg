<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="98" fill="#3E2E23" stroke="#D4963A" stroke-width="2"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#D4963A" stroke-width="1" opacity="0.5"/>
  
  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="85" fill="#F7ECD8"/>
  
  <!-- Decorative circle border -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#3E2E23" stroke-width="1" opacity="0.2"/>
  
  <!-- Coffee cup with steam -->
  <g transform="translate(100, 75)">
    <!-- Cup body -->
    <path d="M -15 -5 L -18 15 Q -18 20 -13 20 L 13 20 Q 18 20 18 15 L 15 -5 Z" fill="none" stroke="#3E2E23" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Cup handle -->
    <path d="M 18 0 Q 30 0 30 10 Q 30 20 18 20" fill="none" stroke="#3E2E23" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Steam wisps -->
    <path d="M -8 -8 Q -6 -15 -4 -8" fill="none" stroke="#D4963A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 0 -10 Q 2 -18 4 -10" fill="none" stroke="#D4963A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 8 -8 Q 10 -15 12 -8" fill="none" stroke="#D4963A" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Coffee inside -->
    <ellipse cx="0" cy="10" rx="12" ry="3" fill="#D4963A" opacity="0.6"/>
  </g>
  
  <!-- Left leaf -->
  <g transform="translate(70, 88)">
    <path d="M 0 0 Q -3 -8 -2 -15 Q 0 -10 2 -5 Q 1 0 0 0" fill="#D4963A" opacity="0.7"/>
    <line x1="0" y1="0" x2="-1" y2="-12" stroke="#3E2E23" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Right leaf -->
  <g transform="translate(130, 88)">
    <path d="M 0 0 Q 3 -8 2 -15 Q 0 -10 -2 -5 Q -1 0 0 0" fill="#D4963A" opacity="0.7"/>
    <line x1="0" y1="0" x2="1" y2="-12" stroke="#3E2E23" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Coffee beans decoration -->
  <g opacity="0.6">
    <ellipse cx="60" cy="105" rx="3" ry="5" fill="#3E2E23" transform="rotate(-30 60 105)"/>
    <ellipse cx="140" cy="105" rx="3" ry="5" fill="#3E2E23" transform="rotate(30 140 105)"/>
  </g>
  
  <!-- Top text arc "EST. 2023" -->
  <defs>
    <path id="topArc" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="bottomArc" d="M 170 100 A 70 70 0 0 1 30 100" fill="none"/>
  </defs>
  
  <text font-family="'Playfair Display', serif" font-size="11" font-weight="bold" letter-spacing="2" fill="#3E2E23">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      EST. 2023
    </textPath>
  </text>
  
  <!-- Bottom text arc "COFFEE SHOP • ROASTERY" -->
  <text font-family="'Inter', sans-serif" font-size="8" font-weight="600" letter-spacing="1.5" fill="#3E2E23">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      COFFEE SHOP • ROASTERY
    </textPath>
  </text>
  
  <!-- Main text "BREWISTA" -->
  <text x="100" y="115" font-family="'Playfair Display', serif" font-size="28" font-weight="800" text-anchor="middle" fill="#D4963A" letter-spacing="1">
    BREWISTA
  </text>
</svg>
